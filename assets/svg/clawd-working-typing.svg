<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <style>
      :root { --duration: 0.72s; }
      .frame {
        opacity: 0;
        animation-name: frame-step;
        animation-duration: var(--duration);
        animation-timing-function: steps(1, end);
        animation-iteration-count: infinite;
        image-rendering: pixelated;
      }
      .f0 { animation-delay: calc(var(--duration) * 0 / -6); }
      .f1 { animation-delay: calc(var(--duration) * 1 / -6); }
      .f2 { animation-delay: calc(var(--duration) * 2 / -6); }
      .f3 { animation-delay: calc(var(--duration) * 3 / -6); }
      .f4 { animation-delay: calc(var(--duration) * 4 / -6); }
      .f5 { animation-delay: calc(var(--duration) * 5 / -6); }
      @keyframes frame-step {
        0%, 16.666% { opacity: 1; }
        16.667%, 100% { opacity: 0; }
      }
    </style>
  </defs>
  <image class="frame f0" href="../png/clawd-working-typing/dree_typing_0.png" x="0" y="0" width="256" height="256" />
  <image class="frame f1" href="../png/clawd-working-typing/dree_typing_1.png" x="0" y="0" width="256" height="256" />
  <image class="frame f2" href="../png/clawd-working-typing/dree_typing_2.png" x="0" y="0" width="256" height="256" />
  <image class="frame f3" href="../png/clawd-working-typing/dree_typing_3.png" x="0" y="0" width="256" height="256" />
  <image class="frame f4" href="../png/clawd-working-typing/dree_typing_4.png" x="0" y="0" width="256" height="256" />
  <image class="frame f5" href="../png/clawd-working-typing/dree_typing_5.png" x="0" y="0" width="256" height="256" />
</svg>
