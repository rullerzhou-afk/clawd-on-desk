<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #ffffff;
  --border: rgba(0, 0, 0, 0.08);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.14), 0 2px 6px rgba(0, 0, 0, 0.08);
  --text: #18181b;
  --text-muted: #71717a;
  --header-bg: #f9fafb;
  --header-border: rgba(0, 0, 0, 0.06);
  --msg-user-bg: #d97757;
  --msg-user-text: #ffffff;
  --msg-claude-bg: #f4f4f5;
  --msg-claude-text: #18181b;
  --input-bg: #f9fafb;
  --input-border: rgba(0, 0, 0, 0.1);
  --input-focus: #d97757;
  --btn-bg: #d97757;
  --btn-hover: #c4684a;
  --btn-text: #ffffff;
  --scroll-thumb: rgba(0, 0, 0, 0.15);
  --close-hover: rgba(0, 0, 0, 0.06);
  --ease: cubic-bezier(0.34, 1.56, 0.64, 1);
  --workspace-bg: #f9fafb;
  --workspace-border: rgba(0, 0, 0, 0.1);
  --workspace-invalid: #ef4444;
  --folder-btn-hover: rgba(0, 0, 0, 0.06);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #18181b;
    --border: rgba(255, 255, 255, 0.1);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    --text: #f4f4f5;
    --text-muted: #a1a1aa;
    --header-bg: #09090b;
    --header-border: rgba(255, 255, 255, 0.06);
    --msg-claude-bg: #27272a;
    --msg-claude-text: #f4f4f5;
    --input-bg: #09090b;
    --input-border: rgba(255, 255, 255, 0.1);
    --scroll-thumb: rgba(255, 255, 255, 0.12);
    --close-hover: rgba(255, 255, 255, 0.08);
    --workspace-bg: #09090b;
    --workspace-border: rgba(255, 255, 255, 0.1);
    --folder-btn-hover: rgba(255, 255, 255, 0.08);
  }
}

html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.panel {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow);
  overflow: hidden;
  opacity: 0;
  transform: scale(0.96) translateY(8px);
  transition: opacity 0.25s var(--ease), transform 0.3s var(--ease);
}
.panel.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px 11px;
  background: var(--header-bg);
  border-bottom: 1px solid var(--header-border);
  flex-shrink: 0;
  -webkit-app-region: drag;
  cursor: grab;
}
.header-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}
.header-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.01em;
  flex: 1;
}
.header-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  background: #d97757;
  color: #fff;
}
.btn-close {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
  -webkit-app-region: no-drag;
}
.btn-close:hover { background: var(--close-hover); color: var(--text); }

/* Workspace selector */
.workspace-selector {
  margin: 10px 12px 0;
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}
.workspace-input {
  flex: 1;
  padding: 7px 9px;
  background: var(--workspace-bg);
  border: 1px solid var(--workspace-border);
  border-radius: 8px;
  font-family: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace;
  font-size: 11px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  cursor: text;
}
.workspace-input:focus { border-color: var(--input-focus); }
.workspace-input.invalid { border-color: var(--workspace-invalid); }
.workspace-input::placeholder { color: var(--text-muted); }
.btn-folder {
  width: 30px;
  height: 30px;
  border-radius: 7px;
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
  font-size: 14px;
}
.btn-folder:hover { background: var(--folder-btn-hover); color: var(--text); }

/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 2px; }

.msg {
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-width: 100%;
}
.msg-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  padding: 0 4px;
}
.msg-bubble {
  padding: 8px 11px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.55;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user .msg-bubble {
  background: var(--msg-user-bg);
  color: var(--msg-user-text);
  border-bottom-right-radius: 3px;
}
.msg.claude .msg-bubble {
  background: var(--msg-claude-bg);
  color: var(--msg-claude-text);
  border-bottom-left-radius: 3px;
}
.msg.claude .msg-bubble.streaming::after {
  content: "▋";
  animation: blink 0.7s step-end infinite;
  opacity: 0.6;
  font-size: 11px;
}
@keyframes blink { 50% { opacity: 0; } }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  color: var(--text-muted);
  padding: 20px;
}
.empty-state-icon { font-size: 28px; opacity: 0.5; }
.empty-state-text { font-size: 13px; text-align: center; }

/* Input area */
.input-area {
  padding: 10px 12px 12px;
  border-top: 1px solid var(--header-border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
  background: var(--bg);
}
.input-wrap {
  flex: 1;
  position: relative;
}
textarea {
  width: 100%;
  min-height: 36px;
  max-height: 120px;
  padding: 8px 10px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 10px;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  resize: none;
  outline: none;
  line-height: 1.45;
  overflow-y: auto;
  transition: border-color 0.15s;
}
textarea::placeholder { color: var(--text-muted); }
textarea:focus { border-color: var(--input-focus); }
textarea::-webkit-scrollbar { width: 4px; }
textarea::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 2px; }

.btn-send {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--btn-bg);
  color: var(--btn-text);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
  font-size: 15px;
}
.btn-send:hover:not(:disabled) { background: var(--btn-hover); }
.btn-send:active:not(:disabled) { transform: scale(0.93); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-send.cancel { background: #ef4444; }
.btn-send.cancel:hover { background: #dc2626; }
</style>
</head>
<body>
<div class="panel" id="panel">
  <!-- Header -->
  <div class="header">
    <svg class="header-icon" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="9" fill="#d97757" opacity="0.15"/>
      <path d="M6 10h8M10 6v8" stroke="#d97757" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <span class="header-title">Ask Claude</span>
    <span class="header-badge">PROMPT</span>
    <button class="btn-close" id="btnClose" title="Close">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2 2l8 8M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Workspace selector -->
  <div class="workspace-selector">
    <input type="text" class="workspace-input" id="workspaceInput" placeholder="Select workspace folder..." />
    <button class="btn-folder" id="btnFolder" title="Select folder">📁</button>
  </div>


  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">💬</div>
      <div class="empty-state-text">Ask me anything.</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Type your question..." rows="1"></textarea>
    </div>
    <button class="btn-send" id="btnSend" title="Send (Enter)">
      <svg class="icon-send" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 7h12M8 2l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg class="icon-cancel" width="10" height="10" viewBox="0 0 10 10" fill="none" style="display:none">
        <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
const panel = document.getElementById("panel");
const messagesEl = document.getElementById("messages");
const emptyState = document.getElementById("emptyState");
const inputEl = document.getElementById("input");
const btnSend = document.getElementById("btnSend");
const btnClose = document.getElementById("btnClose");
const workspaceInput = document.getElementById("workspaceInput");
const btnFolder = document.getElementById("btnFolder");
const iconSend = btnSend.querySelector(".icon-send");
const iconCancel = btnSend.querySelector(".icon-cancel");

let messages = [];   // [{role: "user"|"assistant", content: "..."}]
let currentCwd = "";
let streaming = false;
let currentClaudeBubble = null;
let currentClaudeText = "";
let currentLang = "en";

// Init: receive session data and theme
window.askAPI.onInit((data) => {
  // Load session data
  if (data.session) {
    currentCwd = data.session.cwd || "";
    workspaceInput.value = currentCwd;
    messages = data.session.messages || [];

    // Render existing messages
    if (messages.length > 0) {
      emptyState.remove();
      messages.forEach(msg => {
        addMessage(msg.role, msg.content);
      });
    }
  }

  // Store language preference
  currentLang = data.lang || "en";

  requestAnimationFrame(() => panel.classList.add("visible"));
  inputEl.focus();
});

// Stream handlers
window.askAPI.onStreamChunk((chunk) => {
  if (!currentClaudeBubble) return;
  currentClaudeText += chunk;
  currentClaudeBubble.textContent = currentClaudeText;
  currentClaudeBubble.classList.add("streaming");
  scrollToBottom();
});

window.askAPI.onStreamDone((code) => {
  streaming = false;
  btnSend.disabled = false;
  btnSend.classList.remove("cancel");
  iconSend.style.display = "";
  iconCancel.style.display = "none";
  btnSend.title = "Send (Enter)";
  if (currentClaudeBubble) {
    currentClaudeBubble.classList.remove("streaming");
    if (currentClaudeText) {
      messages[messages.length - 1].content = currentClaudeText;
      // Save session after receiving response
      saveSession();
    }
  }
  currentClaudeBubble = null;
  currentClaudeText = "";
  inputEl.focus();
});

window.askAPI.onStreamError((err) => {
  if (!currentClaudeBubble) return;
  // Show error inline if we haven't gotten any response yet
  if (!currentClaudeText) {
    currentClaudeBubble.textContent = "⚠ " + err.trim();
    currentClaudeBubble.style.color = "#ef4444";
  }
});

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(role, text) {
  if (emptyState.parentNode) emptyState.remove();
  const msg = document.createElement("div");
  msg.className = "msg " + (role === "assistant" ? "claude" : role);
  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = role === "user" ? "You" : "Claude";
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.textContent = text;
  msg.appendChild(label);
  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  scrollToBottom();
  return bubble;
}

function saveSession() {
  if (!currentCwd) return;
  window.askAPI.saveSession(currentCwd, messages);
}

function buildHistory() {
  // Convert messages to history format for API
  const history = [];
  for (let i = 0; i < messages.length - 1; i += 2) {
    if (messages[i].role === "user" && messages[i + 1]?.role === "assistant") {
      history.push({
        user: messages[i].content,
        assistant: messages[i + 1].content
      });
    }
  }
  return history;
}

function sendPrompt() {
  const prompt = inputEl.value.trim();
  if (!prompt || streaming) return;

  streaming = true;
  btnSend.disabled = false;
  btnSend.classList.add("cancel");
  iconSend.style.display = "none";
  iconCancel.style.display = "";
  btnSend.title = currentLang === "zh" ? "取消" : "Cancel";
  inputEl.value = "";
  autoResize();

  addMessage("user", prompt);
  messages.push({ role: "user", content: prompt });

  currentClaudeText = "";
  currentClaudeBubble = addMessage("assistant", "");
  currentClaudeBubble.classList.add("streaming");

  messages.push({ role: "assistant", content: "" });

  // 传递完整的 messages 数组
  window.askAPI.sendPrompt(prompt, messages);
}

btnSend.addEventListener("click", () => {
  if (streaming) {
    window.askAPI.cancelRequest();
  } else {
    sendPrompt();
  }
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendPrompt();
  }
  if (e.key === "Escape") {
    window.askAPI.close();
  }
});

function autoResize() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
}
inputEl.addEventListener("input", autoResize);

btnClose.addEventListener("click", () => window.askAPI.close());

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") window.askAPI.close();
});

// Workspace selector handlers
btnFolder.addEventListener("click", async () => {
  const result = await window.askAPI.selectFolder();
  if (result) {
    await switchWorkspace(result);
  }
});

workspaceInput.addEventListener("blur", async () => {
  const newCwd = workspaceInput.value.trim();
  if (newCwd && newCwd !== currentCwd) {
    await switchWorkspace(newCwd);
  }
});

workspaceInput.addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    const newCwd = workspaceInput.value.trim();
    if (newCwd && newCwd !== currentCwd) {
      await switchWorkspace(newCwd);
    }
    workspaceInput.blur();
  }
});

async function switchWorkspace(newCwd) {
  if (currentCwd && messages.length > 0) {
    saveSession();
  }

  const result = await window.askAPI.switchWorkspace(newCwd);
  if (!result.success) {
    workspaceInput.classList.add("invalid");
    setTimeout(() => workspaceInput.classList.remove("invalid"), 2000);
    workspaceInput.value = currentCwd;
    return;
  }

  currentCwd = newCwd;
  workspaceInput.value = newCwd;
  workspaceInput.classList.remove("invalid");

  messages = [];
  messagesEl.innerHTML = "";
  messagesEl.appendChild(emptyState);

  if (result.session && result.session.messages.length > 0) {
    messages = result.session.messages;
    emptyState.remove();
    messages.forEach(msg => {
      addMessage(msg.role, msg.content);
    });
  }
}
</script>
</body>
</html>
